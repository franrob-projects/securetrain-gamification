<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- Shield shape -->
  <path d="M20,20 L180,20 L180,140 Q100,200 20,140 Z" fill="#CC0000" stroke="#8B0000" stroke-width="2"/>
  <!-- White lower section -->
  <path d="M20,100 L180,100 L180,140 Q100,200 20,140 Z" fill="#ffffff"/>
  <!-- Castle on red section -->
  <rect x="70" y="35" width="60" height="55" fill="#ffffff"/>
  <rect x="65" y="28" width="16" height="20" fill="#ffffff"/>
  <rect x="92" y="28" width="16" height="20" fill="#ffffff"/>
  <rect x="119" y="28" width="16" height="20" fill="#ffffff"/>
  <!-- Castle gate -->
  <rect x="88" y="62" width="24" height="28" fill="#CC0000" rx="2"/>
  <!-- Castle windows -->
  <rect x="73" y="48" width="10" height="12" fill="#CC0000"/>
  <rect x="117" y="48" width="10" height="12" fill="#CC0000"/>
  <!-- Key on white section -->
  <circle cx="100" cy="118" r="12" fill="none" stroke="#CC0000" stroke-width="3"/>
  <circle cx="100" cy="118" r="5" fill="#CC0000"/>
  <rect x="100" y="130" width="3" height="22" fill="#CC0000"/>
  <rect x="96" y="144" width="10" height="3" fill="#CC0000"/>
  <rect x="96" y="150" width="7" height="3" fill="#CC0000"/>
  <!-- Crown -->
  <path d="M70,20 L70,8 L85,14 L100,4 L115,14 L130,8 L130,20 Z" fill="#C9A84C" stroke="#8B6914" stroke-width="1"/>
  <!-- Text below -->
  <text x="100" y="210" font-family="Georgia, serif" font-size="11" fill="#333" text-anchor="middle" letter-spacing="1">GIBRALTAR</text>
</svg>
