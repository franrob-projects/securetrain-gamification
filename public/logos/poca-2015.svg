<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Circle background -->
  <circle cx="100" cy="100" r="90" fill="#1a3a5c"/>
  <!-- Shield -->
  <path d="M100,30 L155,55 L155,110 Q155,155 100,178 Q45,155 45,110 L45,55 Z" fill="#ffffff" opacity="0.15"/>
  <path d="M100,38 L150,61 L150,110 Q150,150 100,170 Q50,150 50,110 L50,61 Z" fill="none" stroke="#ffffff" stroke-width="2"/>
  <!-- £ crossed out / broken chain links -->
  <circle cx="82" cy="95" r="16" fill="none" stroke="#C9A84C" stroke-width="3"/>
  <circle cx="118" cy="95" r="16" fill="none" stroke="#C9A84C" stroke-width="3"/>
  <line x1="82" y1="79" x2="82" y2="111" stroke="#1a3a5c" stroke-width="4"/>
  <line x1="118" y1="79" x2="118" y2="111" stroke="#1a3a5c" stroke-width="4"/>
  <line x1="93" y1="88" x2="107" y2="88" stroke="#C9A84C" stroke-width="3"/>
  <line x1="93" y1="102" x2="107" y2="102" stroke="#C9A84C" stroke-width="3"/>
  <!-- Diagonal strike through -->
  <line x1="68" y1="75" x2="132" y2="125" stroke="#CC0000" stroke-width="4" stroke-linecap="round"/>
  <!-- Label -->
  <text x="100" y="148" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#C9A84C" text-anchor="middle" letter-spacing="2">POCA 2015</text>
  <text x="100" y="163" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">Proceeds of Crime Act</text>
</svg>
